<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingresos del Personal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <section id="body" class="container mt-5">
        <h2 class="mb-4">Gestión de Ingresos del Personal</h2>
        <button type="button" class="btn btn-primary mb-3" id="body_btNuevoIngreso">
            + Nuevo Ingreso
        </button>
        <hr>
        
        <div class="row">
            <div class="col-md-6">
                <div class="alert alert-info shadow-sm">
                    El promedio es de Bs. <span id="body_lblPromedio" class="fw-bold fs-5">0</span>
                </div>
            </div>
            <div class="col-md-6">
                <div class="alert alert-warning shadow-sm">
                    Menor ingreso: Bs. <span id="body_lblMenor" class="fw-bold fs-5">0</span>
                </div>
            </div>
        </div>
    </section>

    <section id="articulo" class="container mt-4" hidden>
        <div class="card shadow-lg border-secondary" style="max-width: 500px; margin: 0 auto;">
            <div class="card-header bg-secondary text-white">
                <h5 class="mb-0" id="ingreso_lblingreso">Procesar Ingreso</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Nombre del empleado:</label>
                    <input type="text" class="form-control" id="inNombre" placeholder="ej: Juan Perez">
                </div>
                <div class="mb-3">
                    <label class="form-label">Ingreso (Bs):</label>
                    <input type="number" class="form-control" id="inIngreso" placeholder="ej: 1500">
                </div>
            </div>
            <div class="card-footer text-end">
                <button type="button" class="btn btn-outline-light me-2" id="articulo_btCancelar">Cancelar</button>
                <button type="button" class="btn btn-success" id="articulo_btAceptar">Aceptar</button>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import cPersona from "./dist/controller/CL_cPersona.js";
        new cPersona();
    </script>

</body>
</html>
